name: Android Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-fdroid-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0"

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run FDroid debug unit tests
        run: ./gradlew :app:testFDroidDebugUnitTest --stacktrace

      - name: Build FDroid debug APK
        run: ./gradlew :app:assembleFDroidDebug --stacktrace

      - name: Upload FDroid debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fdroid-debug
          path: app/build/outputs/apk/FDroid/debug/*.apk
          if-no-files-found: error
