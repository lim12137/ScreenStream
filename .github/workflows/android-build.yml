name: Android Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-fdroid-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0"

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run FDroid debug unit tests
        run: ./gradlew :app:testFDroidDebugUnitTest --stacktrace

      - name: Build FDroid debug APK
        run: ./gradlew :app:assembleFDroidDebug --stacktrace

      - name: Upload FDroid debug APK
        uses: actions/upload-artifact@v6
        with:
          name: app-fdroid-debug
          path: app/build/outputs/apk/FDroid/debug/*.apk
          if-no-files-found: error

  build-fdroid-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        uses: actions/checkout@v5

      - name: Set up JDK 21
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0"

      - name: Grant execute permission for Gradle
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        run: chmod +x gradlew

      - name: Decode release keystore
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release-key.jks"

      - name: Build FDroid release APK
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
        run: ./gradlew :app:assembleFDroidRelease --stacktrace

      - name: Upload FDroid release APK
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: app-fdroid-release
          path: app/build/outputs/apk/FDroid/release/*.apk
          if-no-files-found: error
